# 中文论文生成器 - 配置文件示例
# 复制为 config.yaml 并填入你的 API Key

# 可选模型：openai, anthropic, ollama, qwen, deepseek, zhipu
model:
  provider: openai  # 主模型提供商
  name: gpt-4o     # 模型名称

# 可为不同智能体指定不同模型（可选）
agents:
  abstract:
    provider: openai
    name: gpt-4o-mini  # 摘要可用轻量模型
  introduction:
    provider: openai
    name: gpt-4o
  content:
    provider: openai
    name: gpt-4o
  conclusion:
    provider: openai
    name: gpt-4o
  references:
    provider: openai
    name: gpt-4o-mini
  corrector:
    provider: openai
    name: gpt-4o-mini

quality:
  min_abstract: 180
  min_introduction: 450
  min_content: 1800
  min_conclusion: 280
  max_regen_rounds: 1

# API 密钥（从环境变量读取更安全）
# 在 .env 中设置: OPENAI_API_KEY, ANTHROPIC_API_KEY 等
api_keys:
  openai: ${OPENAI_API_KEY}
  anthropic: ${ANTHROPIC_API_KEY}
  deepseek: ${DEEPSEEK_API_KEY}
  zhipu: ${ZHIPU_API_KEY}
  qwen: ${DASHSCOPE_API_KEY}  # 通义千问
